<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ChatyLife</title>
<style>
body { font-family:sans-serif; margin:0; display:flex; background:#2c2f33; color:#fff; height:100vh; }
#sidebar { width:250px; background:#23272a; padding:10px; overflow-y:auto; display:flex; flex-direction:column; }
#main { flex:1; padding:20px; display:flex; flex-direction:column; }
#chat { flex:1; overflow-y:auto; padding:10px; margin-bottom:10px; background:#23272a; border-radius:10px; border:1px solid #ccc; }
ul { list-style:none; padding:0; margin:0; }
.friend, .request { display:flex; align-items:center; padding:5px; border-radius:5px; margin-bottom:5px; cursor:pointer; }
.friend-active { background:#7289da; font-weight:bold; }
.friend-online .status-dot { background:#43b581; }
.friend-offline .status-dot { background:#99aab5; }
.status-dot { width:10px; height:10px; border-radius:50%; margin-right:5px; display:inline-block; }
.avatar { width:32px; height:32px; border-radius:50%; margin-right:10px; object-fit:cover; }
button { margin-left:5px; padding:3px 6px; font-size:12px; cursor:pointer; }
input { margin-bottom:5px; padding:5px; width:calc(100% - 10px); }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Login/Register</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="loginStatus"></p>

  <div id="profileSection" style="display:none;">
    <h2>Profile</h2>
    <img id="profilePreview" src="" class="avatar"><br>
    <input type="file" id="avatarUpload" accept="image/*">
    <button onclick="uploadAvatar()">Upload</button>

    <h2>Friend Requests</h2>
    <ul id="requests"></ul>

    <h2>Friends</h2>
    <input id="friendName" placeholder="Add friend">
    <button onclick="sendFriendRequest()">Send</button>
    <ul id="friends"></ul>
  </div>
</div>

<div id="main" style="display:none;">
  <h2>Chat with: <span id="currentFriend">None</span></h2>
  <div id="chat"></div>
  <input id="message" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<audio id="notifSound" src="https://www.myinstants.com/media/sounds/message-received.mp3" preload="auto"></audio>

<script>
// ===== Data =====
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = "";
let activeFriend = "";

// ===== Helpers =====
function saveUsers(){ localStorage.setItem("users", JSON.stringify(users)); }
function randomColor(){ return '#'+Math.floor(Math.random()*16777215).toString(16); }
function randomAvatar(){ return 'https://i.pravatar.cc/50?u='+Math.random(); }

// ===== Register/Login =====
function register() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if(!u || !p){ alert("Enter username & password"); return; }
    if(users[u]) { alert("Username exists"); return; }
    users[u] = {password:p, friends:[], messages:{}, online:true, avatar:randomAvatar(), color:randomColor(), requests:[]};
    saveUsers();
    alert("Account created! Login now.");
}

function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if(!users[u] || users[u].password!==p){ alert("Login failed"); return; }
    currentUser = u;
    users[currentUser].online = true;
    saveUsers();
    document.getElementById("loginStatus").innerText="Logged in as "+currentUser;
    document.getElementById("profileSection").style.display="block";
    document.getElementById("main").style.display="flex";
    document.getElementById("profilePreview").src = users[currentUser].avatar;
    refreshRequests();
    refreshFriends();
    setActiveFriend(null);
}

// ===== Avatar =====
function uploadAvatar() {
    const file = document.getElementById("avatarUpload").files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        users[currentUser].avatar = e.target.result;
        saveUsers();
        document.getElementById("profilePreview").src = users[currentUser].avatar;
        refreshFriends();
        refreshChat();
    }
    reader.readAsDataURL(file);
}

// ===== Friend Requests =====
function sendFriendRequest() {
    const f = document.getElementById("friendName").value.trim();
    if(!users[f]){ alert("User not found"); return; }
    if(f === currentUser) { alert("Cannot add yourself"); return; }
    if(users[currentUser].friends.includes(f)) { alert("Already friends"); return; }
    if(!users[f].requests.includes(currentUser)) users[f].requests.push(currentUser);
    saveUsers();
    alert("Friend request sent to " + f);
    document.getElementById("friendName").value="";
}

function refreshRequests() {
    const list=document.getElementById("requests");
    list.innerHTML="";
    if(!users[currentUser].requests) users[currentUser].requests = [];
    users[currentUser].requests.forEach(r=>{
        if(!users[r]) return;
        const li=document.createElement("li");
        li.className="request";
        const avatar=document.createElement("img");
        avatar.src = users[r].avatar;
        avatar.className="avatar";
        li.appendChild(avatar);
        li.appendChild(document.createTextNode(r));
        const accept=document.createElement("button");
        accept.innerText="Accept";
        accept.onclick=()=>{ acceptFriendRequest(r); };
        const decline=document.createElement("button");
        decline.innerText="Decline";
        decline.onclick=()=>{ declineFriendRequest(r); };
        li.appendChild(accept);
        li.appendChild(decline);
        list.appendChild(li);
    });
}

function acceptFriendRequest(f) {
    if(!users[currentUser].friends.includes(f)) users[currentUser].friends.push(f);
    if(!users[f].friends.includes(currentUser)) users[f].friends.push(currentUser);
    if(!users[currentUser].messages[f]) users[currentUser].messages[f] = [];
    if(!users[f].messages[currentUser]) users[f].messages[currentUser] = [];
    users[currentUser].requests = users[currentUser].requests.filter(x=>x!==f);
    saveUsers();
    refreshRequests();
    refreshFriends();
}

function declineFriendRequest(f) {
    users[currentUser].requests = users[currentUser].requests.filter(x=>x!==f);
    saveUsers();
    refreshRequests();
}

// ===== Friends List =====
function refreshFriends() {
    const list=document.getElementById("friends");
    list.innerHTML="";
    if(!users[currentUser].friends) users[currentUser].friends = [];
    users[currentUser].friends.forEach(f=>{
        if(!users[f]) return;
        const li=document.createElement("li");
        li.className = (f===activeFriend?"friend-active ":"") + (users[f].online?"friend-online":"friend-offline");

        const dot=document.createElement("span");
        dot.className="status-dot";
        li.appendChild(dot);

        const avatar=document.createElement("img");
        avatar.src = users[f].avatar;
        avatar.className="avatar";
        li.appendChild(avatar);

        const name=document.createElement("span");
        name.innerText=f;
        li.appendChild(name);

        li.onclick=()=>setActiveFriend(f);

        // Verwijderknop
        const removeBtn = document.createElement("button");
        removeBtn.innerText="Remove";
        removeBtn.style.marginLeft="auto";
        removeBtn.onclick=(e)=>{
            e.stopPropagation();
            removeFriend(f);
        }
        li.appendChild(removeBtn);

        list.appendChild(li);
    });
}

function removeFriend(f) {
    if(!confirm("Remove " + f + " from friends?")) return;
    users[currentUser].friends = users[currentUser].friends.filter(x => x !== f);
    if(users[f] && users[f].friends){
        users[f].friends = users[f].friends.filter(x => x !== currentUser);
    }
    if(activeFriend === f) setActiveFriend(null);
    saveUsers();
    refreshFriends();
    refreshRequests();
}

// ===== Chat =====
function setActiveFriend(friend) {
    activeFriend = friend;
    document.getElementById("currentFriend").innerText = friend || "None";
    refreshFriends();
    refreshChat();
}

function sendMessage() {
    if(!activeFriend) return;
    const msg = document.getElementById("message").value.trim();
    if(!msg) return;
    if(!users[currentUser].messages[activeFriend]) users[currentUser].messages[activeFriend] = [];
    if(!users[activeFriend].messages[currentUser]) users[activeFriend].messages[currentUser] = [];
    const fullMsg = {from:currentUser, text:msg, color:users[currentUser].color, avatar:users[currentUser].avatar};
    users[currentUser].messages[activeFriend].push(fullMsg);
    users[activeFriend].messages[currentUser].push(fullMsg);
    saveUsers();
    document.getElementById("message").value = "";
    refreshChat();
    document.getElementById("notifSound").play();
}

function refreshChat() {
    const chatDiv=document.getElementById("chat");
    chatDiv.innerHTML="";
    if(!activeFriend || !users[currentUser].messages[activeFriend]) return;
    const msgs = users[currentUser].messages[activeFriend];
    msgs.forEach(m=>{
        const div=document.createElement("div");
        div.innerHTML=`<img src="${m.avatar}" class="avatar"><span style="color:${m.color}; font-weight:bold;">${m.from}:</span> ${m.text}`;
        chatDiv.appendChild(div);
    });
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ===== Polling =====
setInterval(()=>{
    if(currentUser){
        users = JSON.parse(localStorage.getItem("users")) || users;
        refreshRequests();
        refreshFriends();
        refreshChat();
    }
}, 1500);

// ===== Logout =====
window.addEventListener("beforeunload",()=>{
    if(currentUser){ users[currentUser].online=false; saveUsers(); }
});
</script>

</body>
</html>
